# =============================================================================
# docker-compose.security.yml — OWNED BY My (Security)
#
# Ports: defined in shared/contracts/ports.yaml
#
# Run standalone:
#   docker compose -f docker-compose.security.yml up -d
#   NOTE: Requires devsecops network. Run once first:
#         docker network create devsecops
#
# Run as part of full stack:
#   docker compose up -d   (from repo root, includes all modules)
# =============================================================================

networks:
  devsecops:
    name: ${DOCKER_NETWORK:-devsecops}
    external: true

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonarqube_db:
  defectdojo_db:
  defectdojo_media:
  defectdojo_redis:

services:

  # ── SonarQube — SAST + Quality Gate ───────────────────
  # Replaces AWS CodeGuru / Snyk paid tier
  # Port: 9000
  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar_pass
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    networks:
      - devsecops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:10-community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar_pass
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - ./security/sast/sonar-quality-profiles:/opt/sonarqube/data/quality-profiles:ro
    networks:
      - devsecops
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ── DefectDojo — Security findings aggregation ────────
  # Single pane of glass: all scan results (Trivy, ZAP, SonarQube, Dep-Check)
  # Replaces AWS Security Hub (~$0.001/finding/month)
  # Port: 8081
  defectdojo-db:
    image: postgres:15-alpine
    container_name: defectdojo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: defectdojo
      POSTGRES_PASSWORD: defectdojo_pass
      POSTGRES_DB: defectdojo
    volumes:
      - defectdojo_db:/var/lib/postgresql/data
    networks:
      - devsecops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defectdojo"]
      interval: 10s
      timeout: 5s
      retries: 5

  defectdojo-redis:
    image: redis:7-alpine
    container_name: defectdojo-redis
    restart: unless-stopped
    volumes:
      - defectdojo_redis:/data
    networks:
      - devsecops
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  defectdojo:
    image: defectdojo/defectdojo-django:latest
    container_name: defectdojo
    restart: unless-stopped
    depends_on:
      defectdojo-db:
        condition: service_healthy
      defectdojo-redis:
        condition: service_healthy
    environment:
      DD_DATABASE_URL: "postgresql://defectdojo:defectdojo_pass@defectdojo-db:5432/defectdojo"
      DD_CELERY_BROKER_URL: "redis://defectdojo-redis:6379/0"
      DD_SECRET_KEY: "local-dev-secret-key-change-in-prod"
      DD_CREDENTIAL_AES_256_KEY: "local-dev-aes-key-32chars-padded"
      DD_ALLOWED_HOSTS: "*"
      DD_DJANGO_ADMIN_ENABLED: "true"
      DD_ADMIN_USER: admin
      DD_ADMIN_PASSWORD: admin123
      DD_ADMIN_MAIL: admin@local.dev
      DD_INITIALIZE: "true"
    ports:
      - "8081:8080"
    volumes:
      - defectdojo_media:/app/media
    networks:
      - devsecops
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v2/users/"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s

  defectdojo-celery:
    image: defectdojo/defectdojo-django:latest
    container_name: defectdojo-celery
    restart: unless-stopped
    command: ["celery", "worker", "--app=dojo", "--loglevel=info", "--concurrency=2"]
    depends_on:
      - defectdojo
    environment:
      DD_DATABASE_URL: "postgresql://defectdojo:defectdojo_pass@defectdojo-db:5432/defectdojo"
      DD_CELERY_BROKER_URL: "redis://defectdojo-redis:6379/0"
      DD_SECRET_KEY: "local-dev-secret-key-change-in-prod"
    networks:
      - devsecops

  # ── OWASP ZAP — DAST daemon ───────────────────────────
  # Runs in daemon mode so Jenkins can trigger scans via API
  # Port: 8090
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: owasp-zap
    restart: unless-stopped
    command: ["zap.sh", "-daemon", "-host", "0.0.0.0", "-port", "8080",
              "-config", "api.addrs.addr.name=.*",
              "-config", "api.addrs.addr.regex=true",
              "-config", "api.key=zap-api-key-local"]
    ports:
      - "8090:8080"
    networks:
      - devsecops
    volumes:
      - ./security/dast/zap-config.yaml:/zap/wrk/zap-config.yaml:ro
