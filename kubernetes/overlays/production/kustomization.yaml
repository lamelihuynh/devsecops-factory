apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: production
resources:
  - ../../base
images:
  - name: tetris-devsecops
    newName: localhost:5001/tetris-devsecops
    newTag: latest   # Promoted by Jenkins after manual approval
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: tetris
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: tetris.localhost
    target:
      kind: Ingress
      name: tetris
