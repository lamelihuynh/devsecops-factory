# =============================================================================
# docker-compose.yml — ROOT (all teams co-own this file)
#
# Composes all three team modules into one stack.
# Uses Docker Compose v2 `include:` to pull each team's file.
#
# This is the ONLY file you need to run:
#   docker compose up -d         # start everything
#   docker compose down          # stop everything
#   docker compose ps            # see all services
#
# To run a single module:
#   docker compose -f docker-compose.infra.yml up -d
#   docker compose -f docker-compose.security.yml up -d
#   docker compose -f docker-compose.obs.yml up -d
# =============================================================================

# Creates the shared network first — all module's services attach to this
networks:
  devsecops:
    name: ${DOCKER_NETWORK:-devsecops}
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# Include each module's compose file
include:
  - docker-compose.infra.yml       # Module 1: Jenkins, Gitea, Registry
  - docker-compose.security.yml    # Module 2: SonarQube, DefectDojo, ZAP
  - docker-compose.obs.yml         # Module 3: Prometheus, Grafana, Loki
