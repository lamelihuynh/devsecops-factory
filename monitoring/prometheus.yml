# monitoring/prometheus.yml — OWNED BY TEAM 3
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: jenkins
    metrics_path: /prometheus
    static_configs:
      - targets: ['jenkins:8080']

  - job_name: sonarqube
    static_configs:
      - targets: ['sonarqube:9000']

  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
